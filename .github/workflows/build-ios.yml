name: Build Unsigned iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project KadomaGomi.xcodeproj \
            -scheme KadomaGomi \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/KadomaGomi.app"
          test -d "$APP_PATH"
          rm -rf Payload KadomaGomi-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry KadomaGomi-unsigned.ipa Payload
          /usr/bin/unzip -l KadomaGomi-unsigned.ipa | grep "Payload/KadomaGomi.app/Info.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: KadomaGomi-unsigned-ipa
          path: KadomaGomi-unsigned.ipa
          if-no-files-found: error

